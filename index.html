<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Branding Architect - Lightweight Café Operating System." />
    <meta name="theme-color" content="#D4AF37" />

    <!-- ── PWA Manifest ── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── iOS / Safari PWA support ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BA Smart OS" />
    <!--
      FIX 1: Changed /icons/ios/icon-180x180.png → /icons/icon-192x192.png
      Reason: /icons/ios/ subdirectory is not defined in manifest.json.
      Using the same icon path that manifest.json declares avoids a 404
      in iOS Safari PWA install and TWA WebView icon resolution.
    -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- ── Android / Chrome extra ── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Branding Architect" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Manrope:wght@200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>Branding Architect – Café OS</title>

    <!--
      Inline critical styles — paint background instantly, zero flash.
      Loading screen only. All other app styles come from index.css.
    -->
    <style>
      /* ── Reset ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body, #root {
        background-color: #050505;
        color: #E5E5E5;
        min-height: 100vh;
        min-height: 100dvh;
      }

      /* ── Loading screen shell ── */
      #app-loading {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #050505;
        /* Subtle radial warmth — matches the gold accent without images */
        background-image:
          radial-gradient(ellipse 70% 55% at 50% 60%,
            rgba(212,175,55,0.055) 0%,
            transparent 70%);
        font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
        /* Fade the whole screen out once React removes this div */
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }

      /* ── Logo mark — pure CSS, no image required ── */
      #al-logo-wrap {
        position: relative;
        width: 72px;
        height: 72px;
        margin-bottom: 28px;
      }

      /* Outer ring — slow pulse */
      #al-logo-wrap::before {
        content: '';
        position: absolute;
        inset: -10px;
        border-radius: 50%;
        border: 1px solid rgba(212,175,55,0.18);
        animation: al-ring-pulse 2.8s ease-in-out infinite;
      }

      /* Inner ring — phase offset */
      #al-logo-wrap::after {
        content: '';
        position: absolute;
        inset: -4px;
        border-radius: 50%;
        border: 1px solid rgba(212,175,55,0.10);
        animation: al-ring-pulse 2.8s ease-in-out 0.7s infinite;
      }

      #al-logo-circle {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: linear-gradient(145deg, #1a1508 0%, #0d0a04 100%);
        border: 1.5px solid rgba(212,175,55,0.30);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 0 0 1px rgba(212,175,55,0.08),
          0 8px 32px rgba(0,0,0,0.6),
          inset 0 1px 0 rgba(212,175,55,0.12);
        position: relative;
        z-index: 1;
        animation: al-logo-appear 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
      }

      /* Utensils icon — pure SVG inline */
      #al-logo-circle svg {
        width: 30px;
        height: 30px;
        opacity: 0.92;
        filter: drop-shadow(0 1px 6px rgba(212,175,55,0.35));
      }

      /* ── Brand text ── */
      #al-brand {
        animation: al-fade-up 0.5s ease 0.2s both;
        text-align: center;
        margin-bottom: 36px;
      }

      #al-brand-name {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 1.45rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: #E8E0CC;
        line-height: 1.2;
        display: block;
      }

      #al-brand-sub {
        font-family: 'Manrope', sans-serif;
        font-size: 0.685rem;
        font-weight: 500;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(212,175,55,0.70);
        display: block;
        margin-top: 5px;
      }

      /* ── Progress bar track ── */
      #al-progress-track {
        width: 120px;
        height: 2px;
        background: rgba(255,255,255,0.06);
        border-radius: 2px;
        overflow: hidden;
        animation: al-fade-up 0.4s ease 0.35s both;
        position: relative;
      }

      /* Animated fill */
      #al-progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #B8941F, #D4AF37, #E8C84A);
        border-radius: 2px;
        animation: al-progress 1.8s cubic-bezier(0.4,0,0.2,1) 0.4s forwards;
        position: relative;
      }

      /* Shimmer on the fill */
      #al-progress-fill::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg,
          transparent 0%,
          rgba(255,255,255,0.40) 50%,
          transparent 100%);
        animation: al-shimmer 1.4s ease 0.6s infinite;
        transform: translateX(-100%);
      }

      /* ── Status text ── */
      #al-status {
        margin-top: 18px;
        font-size: 0.70rem;
        font-weight: 500;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.22);
        animation: al-fade-up 0.4s ease 0.5s both, al-status-cycle 1.8s ease 0.8s infinite;
      }

      /* ── Bottom stamp ── */
      #al-bottom {
        position: absolute;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.60rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(212,175,55,0.22);
        white-space: nowrap;
        animation: al-fade-up 0.4s ease 0.6s both;
      }

      /* ── Grain texture overlay (pure CSS noise — zero cost) ── */
      #app-loading::before {
        content: '';
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.025;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 200px 200px;
      }

      /* ════════════════════════════════
         KEYFRAMES
         ════════════════════════════════ */

      @keyframes al-logo-appear {
        from { opacity: 0; transform: scale(0.78); }
        to   { opacity: 1; transform: scale(1); }
      }

      @keyframes al-fade-up {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes al-ring-pulse {
        0%, 100% { opacity: 0.5; transform: scale(1); }
        50%       { opacity: 0;   transform: scale(1.18); }
      }

      @keyframes al-progress {
        0%   { width: 0%; }
        30%  { width: 42%; }
        65%  { width: 71%; }
        85%  { width: 88%; }
        100% { width: 100%; }
      }

      @keyframes al-shimmer {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(200%); }
      }

      @keyframes al-status-cycle {
        0%, 45%  { opacity: 1; }
        50%, 95% { opacity: 0.35; }
        100%     { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!--
        Premium loading screen — visible before React hydrates.
        React removes #app-loading once the app mounts.
        DO NOT rename or move #root — React mounts into it.
      -->
      <div id="app-loading" aria-label="Loading Branding Architect" role="status">

        <!-- Logo mark — pure CSS + inline SVG, zero external requests -->
        <div id="al-logo-wrap">
          <div id="al-logo-circle">
            <!-- Cutlery icon matching app's menu icons from screenshots -->
            <svg viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="1.6"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 2v7c0 1.1.9 2 2 2h2v11a1 1 0 0 0 2 0V2"/>
              <path d="M8 2v4"/>
              <path d="M5 2v4"/>
              <path d="M19 2a5 5 0 0 1 0 10v8a1 1 0 0 1-2 0V2"/>
            </svg>
          </div>
        </div>

        <!-- Brand name block -->
        <div id="al-brand">
          <span id="al-brand-name">Branding Architect</span>
          <span id="al-brand-sub">Smart Café OS</span>
        </div>

        <!-- Thin animated progress bar -->
        <div id="al-progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100">
          <div id="al-progress-fill"></div>
        </div>

        <!-- Subtle status label -->
        <div id="al-status">Initialising</div>

        <!-- Bottom wordmark stamp -->
        <div id="al-bottom">Powered by Branding Architect</div>

      </div>
    </div>

    <!-- Cashfree JS SDK — loaded before React so window.Cashfree is ready -->
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>

    <!--
      FIX 2: Load registerSW.js directly as a plain script tag.
      Reason: registerSW.js lives in /public and is served as a static file.
      The import './registerSW' in main.jsx looks for it in /src/ at build
      time — Vite cannot find it there and the import silently fails in
      production, so the service worker never registers in the TWA/APK.
      Loading it here as a plain <script> tag means it runs independently
      of the React bundle, always, in every environment.
      The duplicate-registration guard inside registerSW.js makes this
      100% safe even if both paths execute.
    -->
    <script src="/registerSW.js"></script>

    <!--
      Vite dev: resolves /src/main.jsx directly via the dev server.
      Vite build: this line is rewritten to /assets/main-[hash].js automatically.
      DO NOT change this path — it is correct for both dev and production.
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
