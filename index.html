<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Branding Architect - Lightweight Café Operating System." />
    <meta name="theme-color" content="#D4AF37" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Manrope:wght@200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>Branding Architect – Café OS</title>

    <!--
      Inline critical styles so the background colour shows IMMEDIATELY,
      before any JS or CSS bundle has loaded — eliminates the white/black flash.
    -->
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        background-color: #050505;
        color: #E5E5E5;
        min-height: 100vh;
      }
      /* Loading spinner shown while JS bundle parses */
      #app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #050505;
      }
      #app-loading-inner {
        text-align: center;
        color: #D4AF37;
        font-family: 'Manrope', sans-serif;
        font-size: 1.1rem;
      }
      #app-loading-spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(212,175,55,0.2);
        border-top-color: #D4AF37;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 1rem;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Shown until React hydrates — prevents pure black screen -->
      <div id="app-loading">
        <div id="app-loading-inner">
          <div id="app-loading-spinner"></div>
          Loading…
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
