<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#D4AF37" />
  <title>You're Offline — Branding Architect</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #050505;
      color: #f5f5f5;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      text-align: center;
      padding: 2rem;
      gap: 1.5rem;
    }

    .icon {
      font-size: 4rem;
      line-height: 1;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #D4AF37;
    }

    p {
      font-size: 1rem;
      color: #aaa;
      max-width: 320px;
      line-height: 1.6;
    }

    button {
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 8px;
      background: #D4AF37;
      color: #050505;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="icon" aria-hidden="true">📡</div>
  <h1>You're Offline</h1>
  <p>Branding Architect needs an internet connection. Please check your network and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
