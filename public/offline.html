<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Offline — Branding Architect</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #050505;
      color: #E5E5E5;
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: linear-gradient(160deg, rgba(20,15,5,0.98), rgba(8,6,2,0.99));
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.7);
    }

    .icon {
      font-size: 52px;
      margin-bottom: 20px;
      display: block;
    }

    .brand {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(212,175,55,0.5);
      margin-bottom: 16px;
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 10px;
      line-height: 1.2;
    }

    p {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .divider {
      height: 1px;
      background: rgba(212,175,55,0.1);
      margin-bottom: 24px;
    }

    button {
      background: #D4AF37;
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: background 150ms;
    }
    button:hover { background: #C5A059; }

    .status {
      margin-top: 20px;
      font-size: 11px;
      color: rgba(212,175,55,0.35);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">📡</span>
    <p class="brand">Branding Architect</p>
    <h1>You're offline</h1>
    <p>No internet connection detected. Please check your network and try again.</p>
    <div class="divider"></div>
    <button onclick="window.location.reload()">Try Again</button>
    <p class="status">SmartCafé OS · Offline Mode</p>
  </div>
</body>
</html>
